<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Routine — A2 Vocabulary Quiz</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FBF3EC;
    --surface: #FFFFFF;
    --surface-2: #F5E9DE;
    --ink: #2A211C;
    --muted: #8A7B6E;
    --accent: #E9603F;
    --accent-soft: rgba(233,96,63,0.12);
    --correct: #3D7A54;
    --correct-soft: rgba(61,122,84,0.13);
    --incorrect: #C0443A;
    --incorrect-soft: rgba(192,68,58,0.13);
    --cat-routine: #E9603F;
    --cat-freq: #2E7D6B;
    --border: rgba(42,33,28,0.13);
    --radius: 14px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 800px 460px at 12% -10%, rgba(233,96,63,0.09), transparent 55%),
      radial-gradient(ellipse 700px 460px at 110% 10%, rgba(46,125,107,0.06), transparent 55%),
      var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display:flex;
    justify-content:center;
    padding: 40px 20px 60px;
    -webkit-font-smoothing: antialiased;
  }

  .wrap{ width:100%; max-width: 680px; }

  .site-nav{ display:flex; justify-content:flex-start; margin-bottom: 18px; }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    letter-spacing:0.04em;
    color: var(--muted);
    text-decoration:none;
    border:1px solid var(--border);
    background: var(--surface);
    border-radius: 999px;
    padding:8px 14px;
    transition: border-color .15s ease, color .15s ease;
  }
  .back-link:hover{ border-color: var(--muted); color: var(--ink); }
  .back-link:focus-visible{ outline: 2px solid var(--accent); outline-offset: 3px; }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(34px, 6vw, 50px);
    line-height: 1.05;
    margin: 8px 0 6px;
    letter-spacing: -0.01em;
  }
  h1 em{ font-style: italic; color: var(--accent); }

  .lede{
    color: var(--muted);
    font-size: 16px;
    line-height: 1.55;
    max-width: 56ch;
  }

  button{ font-family:'Inter', sans-serif; cursor: pointer; }

  .btn-primary{
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 15px 28px;
    border-radius: 999px;
    font-size: 15.5px;
    font-weight: 600;
    transition: transform .15s ease, box-shadow .15s ease;
    box-shadow: 0 6px 20px rgba(233,96,63,0.26);
  }
  .btn-primary:hover{ transform: translateY(-1px); box-shadow: 0 8px 24px rgba(233,96,63,0.34); }
  .btn-primary:focus-visible{ outline: 2px solid var(--ink); outline-offset: 3px; }
  .btn-primary:disabled{ opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }

  .btn-ghost{
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--border);
    padding: 13px 24px;
    border-radius: 999px;
    font-size: 14.5px;
    font-weight: 500;
    transition: border-color .15s ease;
  }
  .btn-ghost:hover{ border-color: var(--muted); }
  .btn-ghost:focus-visible{ outline: 2px solid var(--ink); outline-offset: 3px; }

  .btn-prev{
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 15px 24px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 500;
    transition: border-color .15s ease, color .15s ease;
  }
  .btn-prev:hover:not(:disabled){ border-color: var(--muted); color: var(--ink); }
  .btn-prev:disabled{ opacity:.35; cursor:not-allowed; }
  .btn-prev:focus-visible{ outline: 2px solid var(--accent); outline-offset: 3px; }

  /* ---------- Start screen ---------- */
  .legend{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 28px 0 32px;
  }
  .legend-item{
    display:flex;
    align-items:center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13.5px;
  }
  .dot{ width: 9px; height: 9px; border-radius: 50%; flex-shrink:0; }

  /* ---------- Path / progress ---------- */
  .path{
    display:flex;
    align-items:center;
    gap: 4px;
    margin: 30px 0 36px;
    flex-wrap: wrap;
    row-gap: 8px;
  }
  .node-link{
    flex: 1;
    min-width: 6px;
    height: 2px;
    background: var(--border);
  }
  .node-link.done{ background: var(--muted); }
  .node{
    width: 13px; height: 13px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    flex-shrink:0;
    transition: all .2s ease;
  }
  .node.current{
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
    transform: scale(1.15);
  }
  .node.correct{ background: var(--correct); border-color: var(--correct); }
  .node.incorrect{ background: var(--incorrect); border-color: var(--incorrect); }

  .topline{
    display:flex;
    justify-content: space-between;
    align-items:baseline;
    margin-bottom: 6px;
  }
  .qcount{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  .cat-badge{
    display:inline-flex;
    align-items:center;
    gap: 7px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ---------- Question card ---------- */
  .card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 30px 28px;
    box-shadow: 0 1px 2px rgba(42,33,28,0.04), 0 10px 30px rgba(42,33,28,0.06);
  }
  .qtext{
    font-family:'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(19px, 3.2vw, 23px);
    line-height: 1.45;
    margin: 0 0 26px;
  }
  .qtext .blank{ color: var(--accent); font-weight: 600; }

  .options{
    display:flex;
    flex-direction: column;
    gap: 10px;
  }
  .option{
    text-align:left;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 15px;
    display:flex;
    align-items:center;
    gap: 12px;
    transition: border-color .15s ease, background .15s ease;
  }
  .option:hover:not(:disabled){ border-color: var(--muted); }
  .option:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }
  .option.selected{ border-color: var(--accent); background: var(--accent-soft); }
  .option.correct{ border-color: var(--correct); background: var(--correct-soft); }
  .option.incorrect{ border-color: var(--incorrect); background: var(--incorrect-soft); }
  .option:disabled{ cursor: default; }
  .opt-letter{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--muted);
    width: 18px;
    flex-shrink:0;
  }

  .feedback{
    margin-top: 20px;
    padding: 16px 18px;
    border-radius: 10px;
    font-size: 14.5px;
    line-height: 1.55;
    border: 1px solid var(--border);
    display:none;
  }
  .feedback.show{ display:block; }
  .feedback.correct{ background: var(--correct-soft); border-color: rgba(61,122,84,0.4); }
  .feedback.incorrect{ background: var(--incorrect-soft); border-color: rgba(192,68,58,0.4); }
  .feedback-label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display:block;
    margin-bottom: 6px;
  }
  .feedback.correct .feedback-label{ color: var(--correct); }
  .feedback.incorrect .feedback-label{ color: var(--incorrect); }

  .actions{
    display:flex;
    justify-content: space-between;
    align-items:center;
    margin-top: 24px;
    gap: 10px;
  }

  /* ---------- Results ---------- */
  .score-hero{
    text-align:center;
    padding: 38px 20px 30px;
  }
  .score-num{
    font-family:'Fraunces', serif;
    font-size: 64px;
    font-weight: 600;
    color: var(--accent);
    line-height:1;
  }
  .score-denom{
    font-family:'IBM Plex Mono', monospace;
    color: var(--muted);
    font-size: 14px;
    margin-top: 6px;
  }
  .band{
    margin-top: 14px;
    font-size: 15.5px;
    color: var(--muted);
    max-width: 46ch;
    margin-left:auto; margin-right:auto;
  }

  .cat-breakdown{
    display:flex;
    flex-direction:column;
    gap: 12px;
    margin: 28px 0;
  }
  .cat-row{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .cat-row-top{
    display:flex;
    justify-content: space-between;
    align-items:center;
    font-size: 13.5px;
    margin-bottom: 8px;
  }
  .cat-name{ display:flex; align-items:center; gap:8px; font-weight: 500; }
  .cat-score{ font-family:'IBM Plex Mono', monospace; color: var(--muted); }
  .bar-track{
    height: 6px;
    background: var(--surface-2);
    border-radius: 4px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    border-radius:4px;
  }

  .result-actions{
    display:flex;
    gap: 12px;
    justify-content:center;
    margin-top: 30px;
    flex-wrap: wrap;
  }

  /* ---------- Review ---------- */
  .review-item{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 14px;
  }
  .review-q{
    font-family:'Fraunces', serif;
    font-size: 17px;
    line-height: 1.5;
    margin: 6px 0 12px;
  }
  .review-answer-row{ font-size: 14px; margin: 4px 0; }
  .review-answer-row .lbl{ color: var(--muted); margin-right: 6px; }
  .review-answer-row .val.correct{ color: var(--correct); font-weight:600; }
  .review-answer-row .val.incorrect{ color: var(--incorrect); font-weight:600; text-decoration: line-through; text-decoration-color: var(--incorrect); }
  .review-explain{
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.55;
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }
  @media (max-width: 480px){
    .legend{ grid-template-columns: 1fr; }
    .card{ padding: 22px 18px; }
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const CATEGORIES = {
  routine: { name: "Daily Actions",      color: "var(--cat-routine)" },
  freq:    { name: "Frequency & Degree",  color: "var(--cat-freq)"    }
};

const QUESTIONS = [
  {
    cat: "routine",
    text: "I always <span class=\"blank\">______</span> at 7 o'clock, then I take a shower.",
    options: ["wake up", "go up", "stand up", "rise up"],
    correct: 0,
    explain: "\u2018Wake up\u2019 is the everyday phrase for stopping sleeping. \u2018Get up\u2019 (leaving bed) is similar, but \u2018go up\u2019, \u2018stand up\u2019 and \u2018rise up\u2019 don\u2019t mean this at all."
  },
  {
    cat: "routine",
    text: "In the morning I don't have time to make coffee at home, so I <span class=\"blank\">______</span> from the caf\u00e9 near my office.",
    options: ["grab a coffee", "catch a coffee", "hold a coffee", "take a coffee cup"],
    correct: 0,
    explain: "\u2018Grab a coffee\u2019 means to get a coffee quickly, often to take away. It\u2019s a very common informal phrase for getting food or drink fast."
  },
  {
    cat: "routine",
    text: "I usually eat breakfast, but this morning I was late, so I <span class=\"blank\">______</span>.",
    options: ["skipped breakfast", "jumped breakfast", "cut breakfast", "passed breakfast"],
    correct: 0,
    explain: "\u2018Skip a meal\u2019 means to not eat it. \u2018Skip breakfast/lunch/dinner\u2019 is the fixed expression \u2014 the other verbs don\u2019t work with meals."
  },
  {
    cat: "routine",
    text: "On Saturday mornings I <span class=\"blank\">______</span>: I go to the bank, the post office and the supermarket.",
    options: ["run errands", "walk errands", "do errands", "make errands"],
    correct: 0,
    explain: "\u2018Run errands\u2019 is the fixed phrase for doing a list of small jobs outside the house. You can\u2019t \u2018walk\u2019, \u2018do\u2019 or \u2018make\u2019 errands in natural English."
  },
  {
    cat: "routine",
    text: "It takes me 40 minutes to <span class=\"blank\">______</span> every day because I live far from the city centre.",
    options: ["commute to work", "move to work", "run to work", "commute at work"],
    correct: 0,
    explain: "\u2018Commute to work\u2019 means to travel regularly between home and work. Note the preposition: commute *to* work, not *at* work."
  },
  {
    cat: "routine",
    text: "After work, I like to <span class=\"blank\">______</span> and lift some weights.",
    options: ["hit the gym", "touch the gym", "go the gym", "hit in the gym"],
    correct: 0,
    explain: "\u2018Hit the gym\u2019 is an informal way of saying \u2018go to the gym to exercise\u2019. It\u2019s used with other places too, like \u2018hit the shops\u2019 or \u2018hit the road\u2019."
  },
  {
    cat: "routine",
    text: "This month I have a very <span class=\"blank\">______</span> \u2014 meetings every day and almost no free time.",
    options: ["busy schedule", "busy program", "full agenda", "quick schedule"],
    correct: 0,
    explain: "\u2018A busy schedule\u2019 is the natural way to describe a full timetable with a lot of things to do. \u2018Program\u2019 and \u2018agenda\u2019 exist, but \u2018busy schedule\u2019 is the everyday collocation."
  },
  {
    cat: "freq",
    text: "I don't go to the cinema every week, but <span class=\"blank\">______</span> I watch a film there.",
    options: ["from time to time", "from time", "time to time", "at time to time"],
    correct: 0,
    explain: "\u2018From time to time\u2019 means \u2018sometimes, not often, not never\u2019. All three words are needed \u2014 you can\u2019t shorten or change the phrase."
  },
  {
    cat: "freq",
    text: "\u201cDo you prefer tea or coffee?\u201d \u201c<span class=\"blank\">______</span> \u2014 I drink both, depending on my mood.\u201d",
    options: ["A bit of both", "A piece of both", "A little of both", "Some of both"],
    correct: 0,
    explain: "\u2018A bit of both\u2019 is the fixed, informal way to say you like or do two things partly, not just one. It\u2019s a very common answer in everyday conversation."
  },
  {
    cat: "freq",
    text: "\u201cHow much sugar do you want in your tea?\u201d \u201cJust <span class=\"blank\">______</span>, please \u2014 not too much!\u201d",
    options: ["a teeny bit", "a teeny much", "a bit teeny", "a teeny many"],
    correct: 0,
    explain: "\u2018A teeny bit\u2019 is an informal, friendly way of saying \u2018a very small amount\u2019. Only \u2018a teeny bit\u2019 is correct \u2014 the other combinations aren\u2019t real English."
  },
  {
    cat: "freq",
    text: "\u201cWhat is a <span class=\"blank\">______</span> day for you?\u201d \u201cI wake up at seven, go to work, and relax in the evening.\u201d",
    options: ["typical", "typic", "typically", "type"],
    correct: 0,
    explain: "\u2018Typical\u2019 is the adjective meaning \u2018usual\u2019 or \u2018normal\u2019, and it goes before a noun like \u2018day\u2019. \u2018Typically\u2019 is the adverb form, so it can\u2019t be used here."
  },
  {
    cat: "routine",
    text: "What does \u2018grab a coffee\u2019 mean?",
    options: ["to get a coffee quickly", "to hold a coffee cup tightly", "to make coffee at home", "to spill your coffee"],
    correct: 0,
    explain: "\u2018Grab\u2019 in this phrase means \u2018to get quickly\u2019, not \u2018to hold tightly\u2019. \u2018Grab a coffee/bite/snack\u2019 all mean getting something fast, usually on the way somewhere."
  },
  {
    cat: "routine",
    text: "If someone has \u2018a busy schedule\u2019, it means\u2026",
    options: ["they have a lot of things to do", "they have a lot of free time", "they are relaxed all day", "they don't have any plans"],
    correct: 0,
    explain: "A busy schedule is full of appointments, meetings and tasks \u2014 the opposite of having free time or no plans."
  },
  {
    cat: "freq",
    text: "\u2018From time to time\u2019 means the same as\u2026",
    options: ["sometimes, not often", "always, every day", "never", "all the time"],
    correct: 0,
    explain: "\u2018From time to time\u2019 sits in the middle of the frequency scale \u2014 more than \u2018never\u2019, but much less than \u2018always\u2019 or \u2018all the time\u2019."
  }
];

// Shuffle each question's options so the correct answer isn't always in the same slot.
function shuffleOptions(q){
  const correctText = q.options[q.correct];
  const arr = q.options.slice();
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  q.options = arr;
  q.correct = arr.indexOf(correctText);
}
QUESTIONS.forEach(shuffleOptions);

const state = {
  screen: 'start',
  index: 0,
  selected: null,
  answers: new Array(QUESTIONS.length).fill(null)
};

function letterFor(i){ return ['A','B','C','D'][i]; }

function renderLegend(){
  return Object.values(CATEGORIES).map(c =>
    `<div class="legend-item"><span class="dot" style="background:${c.color}"></span>${c.name}</div>`
  ).join('');
}

function renderBackLink(){
  return `<div class="site-nav"><a class="back-link" href="index.html">&larr; All quizzes</a></div>`;
}

function renderStart(){
  return `
    ${renderBackLink()}
    <div class="eyebrow">A2 \u00b7 Vocabulary</div>
    <h1>Daily <em>Routine</em></h1>
    <p class="lede">Fourteen quick questions on the everyday phrases for talking about your day and habits \u2014 from waking up and grabbing a coffee to hitting the gym after work.</p>
    <div class="legend">${renderLegend()}</div>
    <button class="btn-primary" onclick="startQuiz()">Start the quiz \u2192</button>
  `;
}

function renderPath(){
  let html = '<div class="path">';
  QUESTIONS.forEach((q, i) => {
    const ans = state.answers[i];
    let cls = 'node';
    if (i === state.index && !ans) cls += ' current';
    if (ans) cls += ans.correct ? ' correct' : ' incorrect';
    html += `<div class="${cls}" title="Question ${i+1}"></div>`;
    if (i < QUESTIONS.length - 1){
      html += `<div class="node-link${ans ? ' done' : ''}"></div>`;
    }
  });
  html += '</div>';
  return html;
}

function renderQuestion(){
  const q = QUESTIONS[state.index];
  const cat = CATEGORIES[q.cat];
  const ans = state.answers[state.index];
  const checked = !!ans;

  const optionsHtml = q.options.map((opt, i) => {
    let cls = 'option';
    let disabled = checked ? 'disabled' : '';
    if (checked){
      if (i === q.correct) cls += ' correct';
      else if (i === ans.selected) cls += ' incorrect';
    } else if (i === state.selected){
      cls += ' selected';
    }
    return `<button class="${cls}" ${disabled} onclick="selectOption(${i})">
      <span class="opt-letter">${letterFor(i)}</span>${opt}
    </button>`;
  }).join('');

  const isLast = state.index === QUESTIONS.length - 1;
  const actionLabel = checked ? (isLast ? 'See results \u2192' : 'Next question \u2192') : 'Check answer';
  const actionHandler = checked ? 'goNext()' : 'checkAnswer()';
  const actionDisabled = (!checked && state.selected === null) ? 'disabled' : '';
  const prevDisabled = state.index === 0 ? 'disabled' : '';

  let feedbackHtml = '';
  if (checked){
    feedbackHtml = `
      <div class="feedback show ${ans.correct ? 'correct' : 'incorrect'}">
        <span class="feedback-label">${ans.correct ? 'Correct' : 'Not quite'}</span>
        ${q.explain}
      </div>`;
  }

  return `
    ${renderBackLink()}
    ${renderPath()}
    <div class="topline">
      <span class="qcount">Question ${state.index + 1} / ${QUESTIONS.length}</span>
    </div>
    <div class="cat-badge"><span class="dot" style="background:${cat.color}"></span>${cat.name}</div>
    <div class="card">
      <p class="qtext">${q.text}</p>
      <div class="options">${optionsHtml}</div>
      ${feedbackHtml}
      <div class="actions">
        <button class="btn-prev" ${prevDisabled} onclick="goPrev()">&larr; Previous</button>
        <button class="btn-primary" ${actionDisabled} onclick="${actionHandler}">${actionLabel}</button>
      </div>
    </div>
  `;
}

function scoreByCategory(){
  const out = {};
  Object.keys(CATEGORIES).forEach(k => out[k] = {correct:0, total:0});
  QUESTIONS.forEach((q, i) => {
    out[q.cat].total++;
    if (state.answers[i] && state.answers[i].correct) out[q.cat].correct++;
  });
  return out;
}

function bandMessage(score, total){
  const pct = score/total;
  if (pct >= 0.85) return "Great job! You know these everyday phrases really well \u2014 try using a few of them today.";
  if (pct >= 0.6) return "Good work \u2014 most phrases are clear. Look at the ones you missed and try them in your own sentences.";
  return "A useful first look \u2014 read the explanations again and practise the phrases in short sentences about your own day.";
}

function renderResults(){
  const total = QUESTIONS.length;
  const score = state.answers.filter(a => a && a.correct).length;
  const byCat = scoreByCategory();

  const rows = Object.entries(byCat).map(([key, v]) => {
    const cat = CATEGORIES[key];
    const pct = Math.round((v.correct / v.total) * 100);
    return `
      <div class="cat-row">
        <div class="cat-row-top">
          <span class="cat-name"><span class="dot" style="background:${cat.color}"></span>${cat.name}</span>
          <span class="cat-score">${v.correct}/${v.total}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${cat.color}"></div></div>
      </div>`;
  }).join('');

  return `
    ${renderBackLink()}
    <div class="score-hero">
      <div class="eyebrow">Results</div>
      <div class="score-num">${score}<span style="font-size:28px;color:var(--muted)"> / ${total}</span></div>
      <p class="band">${bandMessage(score, total)}</p>
    </div>
    <div class="cat-breakdown">${rows}</div>
    <div class="result-actions">
      <button class="btn-primary" onclick="showReview()">Review every answer</button>
      <button class="btn-ghost" onclick="restartQuiz()">Retry quiz</button>
      <a class="btn-ghost" href="index.html" style="text-decoration:none; display:inline-flex; align-items:center;">All quizzes</a>
    </div>
  `;
}

function renderReview(){
  const items = QUESTIONS.map((q, i) => {
    const ans = state.answers[i];
    const cat = CATEGORIES[q.cat];
    return `
      <div class="review-item">
        <div class="cat-badge"><span class="dot" style="background:${cat.color}"></span>${cat.name} \u00b7 Q${i+1}</div>
        <p class="review-q">${q.text}</p>
        <div class="review-answer-row"><span class="lbl">Your answer:</span><span class="val ${ans.correct ? 'correct' : 'incorrect'}">${q.options[ans.selected]}</span></div>
        ${!ans.correct ? `<div class="review-answer-row"><span class="lbl">Correct answer:</span><span class="val correct">${q.options[q.correct]}</span></div>` : ''}
        <div class="review-explain">${q.explain}</div>
      </div>`;
  }).join('');

  return `
    ${renderBackLink()}
    <div class="eyebrow">Full review</div>
    <h1 style="font-size:32px;">Every phrase, retraced</h1>
    <div style="margin: 24px 0;">${items}</div>
    <div class="result-actions">
      <button class="btn-ghost" onclick="restartQuiz()">Retry quiz</button>
      <a class="btn-ghost" href="index.html" style="text-decoration:none; display:inline-flex; align-items:center;">All quizzes</a>
    </div>
  `;
}

function render(){
  const app = document.getElementById('app');
  if (state.screen === 'start') app.innerHTML = renderStart();
  else if (state.screen === 'question') app.innerHTML = renderQuestion();
  else if (state.screen === 'results') app.innerHTML = renderResults();
  else if (state.screen === 'review') app.innerHTML = renderReview();
  window.scrollTo({top:0, behavior:'instant'});
}

function startQuiz(){
  state.screen = 'question';
  state.index = 0;
  render();
}

function selectOption(i){
  if (state.answers[state.index]) return;
  state.selected = i;
  render();
}

function checkAnswer(){
  if (state.selected === null) return;
  const q = QUESTIONS[state.index];
  state.answers[state.index] = { selected: state.selected, correct: state.selected === q.correct };
  render();
}

function goNext(){
  if (state.index < QUESTIONS.length - 1){
    state.index++;
    state.selected = null;
    state.screen = 'question';
  } else {
    state.screen = 'results';
  }
  render();
}

function goPrev(){
  if (state.index > 0){
    state.index--;
    const prevAns = state.answers[state.index];
    state.selected = prevAns ? prevAns.selected : null;
    state.screen = 'question';
    render();
  }
}

function showReview(){
  state.screen = 'review';
  render();
}

function restartQuiz(){
  state.index = 0;
  state.selected = null;
  state.answers = new Array(QUESTIONS.length).fill(null);
  state.screen = 'start';
  render();
}

render();
</script>
</body>
</html>
